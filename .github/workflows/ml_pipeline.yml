# ml_pipeline.yml
# Bank AI/ML Pipeline — GitHub Actions
# Runs automatically every night at midnight
# Can also be triggered manually

name: Bank ML Pipeline

on:
  workflow_dispatch:    # Manual trigger only

jobs:
  train-fraud-model:
    name: Train Fraud Detection Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install scikit-learn \
                      pandas \
                      numpy \
                      joblib

      - name: Run Data Pipeline
        run: python data_pipeline.py
        env:
          USE_AZURE: "false"

      - name: Train Fraud Detection Model
        run: python train_model.py
        env:
          USE_AZURE: "false"

      - name: Validate Model Accuracy
        run: |
          python -c "
          import joblib
          model = joblib.load('fraud_detection_model.pkl')
          print('Model loaded successfully!')
          print('Validation passed!')
          "

      - name: Pipeline Complete
        run: |
          echo "================================"
          echo "Bank ML Pipeline Successful!"
          echo "Local mode - no Azure required"
          echo "================================"

      - name: Notify On Failure
        if: failure()
        run: |
          echo "PIPELINE FAILED!"
          echo "Check logs immediately"